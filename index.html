  <script>
    // アコーディオン
    $('.sec01_accBtn').click(function () {
      $(this).toggleClass("is-active").prev().slideToggle();
      $(this).prevAll(".sec01_link1").toggleClass("is-active");
    });
    $('.sec03_accordion_head').click(function () {
      $(this).toggleClass("is-active").next().slideToggle();
    });
    $('.sec07_accordion_head').click(function () {
      $(this).toggleClass("is-active").next().slideToggle();
    });
    $(".adlpC-accordion02 .adlpC-accordion02_header").on("click", function () {
      $(this).next(".adlpC-accordion02_body").slideToggle();
      $(this).toggleClass("open");
    });
    // スライダー（CASE）
    $('.sec03_slider').slick({
      dots: false,
      autoplaySpeed: 10000,
      autoplay: true,
      prevArrow: '<img src="img/common/sec03_arrow_prev.jpg" alt="" class="prev">',
      nextArrow: '<img src="img/common/sec03_arrow_next.jpg" alt="" class="next">',
    });
    // スライドが変更されたらアコーディオンを閉じる処理を追加
    $('.sec03_slider').on('afterChange', function (event, slick, currentSlide) {
      // アクティブなアコーディオンを閉じる
      $('.sec03_accordion_head.is-active').removeClass('is-active').next().slideUp();
    });
    // スライダー（FLOW）
    $(".slide__slider").slick({
      variableWidth: true,
      prevArrow: '<img src="img/common/sec10_parts_arrow_prev.png" class="prev-arrow">',
      nextArrow: '<img src="img/common/sec10_parts_arrow_next.png" class="next-arrow">',
      infinite: true,
      dots: true,
      autoplaySpeed: 10000,
      autoplay: true,
      responsive: [{
        breakpoint: 767,
        settings: {
          variableWidth: true,
          slidesToShow: 1,
          centerMode: true,
        },
      },],
    });
    // タブ（7つの施術方法）
    $('.tabs .tab').on('click', function () {
      $('.tabs .active').removeClass('active');
      $(this).addClass('active');
      const index = $('.tabs .tab').index(this);
      $('.adlpC-contents .adlpC-content.show').fadeOut(150, function () {
        $(this).removeClass('show');
        $('.adlpC-contents .adlpC-content:eq(' + index + ')').fadeIn(150, function () {
          $(this).addClass('show');
          // スクロール処理
          const contentPosition = $(this).offset().top;
          $('html, body').animate({
            scrollTop: contentPosition
          }, 500);
        });
      });
    });
    // .sec06_link要素のクリックに対する追加のコード
    $('.sec06_link').on('click', function (event) {
      // クリックされた要素のIDを取得します
      const clickedId = $(this).attr('id');
      // clickedIdに応じて対応するタブを探し、クリックイベントをトリガーします
      switch (clickedId) {
        case 'sec06_1_1':
          $('.tabs .tab:eq(0)').trigger('click'); // 1番目のタブをクリック
          break;
        case 'sec06_1_2':
          $('.tabs .tab:eq(1)').trigger('click'); // 2番目のタブをクリック
          break;
        case 'sec06_2_1':
          $('.tabs .tab:eq(2)').trigger('click'); // 3番目のタブをクリック
          break;
        case 'sec06_2_2':
          $('.tabs .tab:eq(4)').trigger('click'); // 5番目のタブをクリック
          break;
        case 'sec06_3_1':
          $('.tabs .tab:eq(3)').trigger('click'); // 4番目のタブをクリック
          break;
        case 'sec06_4_1':
          $('.tabs .tab:eq(5)').trigger('click'); // 6番目のタブをクリック
          break;
        case 'sec06_4_2':
          $('.tabs .tab:eq(4)').trigger('click'); // 5番目のタブをクリック
          break;
        case 'sec06_4_3':
          $('.tabs .tab:eq(6)').trigger('click'); // 7番目のタブをクリック
          break;
        default:
          break;
      }
      // .sec07_tabWrapperのエリアまでスクロールします
      $('html, body').animate({
        scrollTop: $('.adlpC-content_area').offset().top
      }, 800); // スクロールの速度を調整する場合は800の部分を変更してください
    });
    // タブ（ドクター）
    let tabs2 = $('.adlpC-tab2');
    $('.adlpC-tab2').on('click', function () {
      $('.active').removeClass('active');
      $(this).addClass('active');
      const index = tabs2.index(this);
      $('.adlpC-content2').removeClass('show').eq(index).addClass('show');
    })
    //スムーススクロール
    $('a[href^="#"]').on('click', function (e) {
      e.preventDefault();
      var href = $(this).attr("href");
      var target = $(href == "#" || href == "" ? 'html' : href);
      var position = target.offset().top;
      $("html, body").animate({
        scrollTop: position
      }, 800, "swing");
    });
    // .adlp-floating　スクロール後表示
    window.addEventListener('scroll', function () {
      var floatingBtn = document.querySelector('.adlp-floating');
      if (!floatingBtn) return; // 要素がない場合はスキップ

      var scrollHeight = window.scrollY || window.pageYOffset;
      var windowHeight = window.innerHeight; // これが100vhの高さ

      // 100vh以上スクロールしたらクラスを付与、戻ったら外す
      if (scrollHeight >= windowHeight) {
        floatingBtn.classList.add('is-show');
      } else {
        floatingBtn.classList.remove('is-show');
      }
    });
    // 計測用クラス付与のためのjs ここから このコードは、body終了タグ 直前のなるべく下のほうに設置してください。
    var appendAttr = function (visibility, click) {
      var num = 1;
      return {
        viewArea: function () {
          var sectionList = document.querySelectorAll('[data-type="visibility"]');
          Array.prototype.slice.call(sectionList).forEach(function (section) {
            section.classList.add(visibility + num++);
          });
          return num = 1;
        },
        cvArea: function () {
          var btnList = document.querySelectorAll('[data-type="click"]');
          Array.prototype.slice.call(btnList).forEach(function (btn) {
            btn.classList.add(click + num++);
          });
          return num = 1;
        },
        lazyClass: function () {
          var imgList = document.querySelectorAll('.screen img');
          Array.prototype.slice.call(imgList).forEach(function (imgElem) {
            imgElem.classList.add('lozad');
          });
        },
        setRel: function () {
          var aList = document.querySelectorAll('a');
          Array.prototype.slice.call(aList).forEach(function (els) {
            if (els.hasAttribute('target') === false) {
              return;
            }
            if (els.getAttribute('target') !== '_blank') {
              return;
            }
            els.setAttribute('rel', 'noopener noreferrer');
          });
        }
      };
    }('view_area_', 'cv_area_');
    appendAttr.viewArea();
    appendAttr.cvArea();
    appendAttr.setRel();
    // 計測用クラス付与のためのjs ここまで

  </script>
